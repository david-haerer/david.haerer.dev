<li>
    {{ if .Param "datesinlist" }}
        <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
            {{ .Date.Format "2006-01-02" }}
        </time> &ndash;
    {{ end }}
    <a
        href="{{ .RelPermalink }}"
        {{ if isset .Params "redirect" }}
            class="external"
        {{ end }}>{{ .Title }}</a>
    {{ if .Param "authorsinlist" }}
        {{ range .Param "authors" }} by {{ . }}{{ end }}
    {{ end }}
</li>
