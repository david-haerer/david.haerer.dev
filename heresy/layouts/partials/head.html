<title>
  {{ if not .IsHome }}{{ .Title | title }} | {{ end }}{{ .Site.Title }}
</title>
<link rel="canonical" href="{{ .Site.BaseURL }}" />
<link
  rel="alternate"
  type="application/rss+xml"
  title="{{ .Site.Title }} RSS"
  href="/index.xml"
/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/comic-mono@0.0.1/index.css">
<link rel="stylesheet" type="text/css" href="/style.css" />
<link rel="stylesheet" type="text/css" href="/color.css" />
<link rel="stylesheet" type="text/css" href="/ayu-dark.css" />
<link rel="stylesheet" type="text/css" href="/ayu-light.css" />
{{ with .Site.Params.favicon }}<link rel="icon" href="{{ . }}" />{{ end -}}
<meta
  name="description"
  content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Summary }}{{ end }}"
/>
{{ if isset .Params "tags" }} <meta name="keywords" content="{{ with
.Params.tags }}{{ delimit . ", " }}{{ end }}" /> {{ end -}}
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="index, follow" />
<meta charset="utf-8" />
{{ if isset .Params "redirect" }}<meta
  http-equiv="refresh"
  content="0; url='{{ .Params.redirect }}'"
/>{{ end -}} {{ if .Params.math }}{{ partial "katex.html" . }}{{ end }}
